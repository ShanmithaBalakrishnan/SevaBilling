<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>BillFlow — Universal Billing</title>
    <style>
      :root {
        --bg: #f7f6f2;
        --surface: #fff;
        --surface2: #f1efe8;
        --border: rgba(0, 0, 0, 0.08);
        --border-md: rgba(0, 0, 0, 0.14);
        --text: #1a1a18;
        --text2: #5f5e5a;
        --text3: #888780;
        --accent: #185fa5;
        --accent-bg: #e6f1fb;
        --accent-text: #0c447c;
        --green: #3b6d11;
        --green-bg: #eaf3de;
        --amber: #854f0b;
        --amber-bg: #faeeda;
        --red: #a32d2d;
        --red-bg: #fcebeb;
        --r: 10px;
        --r-sm: 7px;
        --sidebar: 220px;
        --topbar: 54px;
        --bottomnav: 60px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
      }
      button,
      input,
      select,
      textarea {
        font-family: inherit;
        font-size: 14px;
      }
      button {
        cursor: pointer;
      }
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-md);
        border-radius: 4px;
      }

      /* APP SHELL */
      .app {
        display: flex;
        height: 100dvh;
        overflow: hidden;
      }

      /* SIDEBAR */
      .sidebar {
        width: var(--sidebar);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: transform 0.25s;
        z-index: 200;
      }
      .brand {
        padding: clamp(12px, 2vw, 18px) 16px clamp(10px, 1.5vw, 14px);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .brand h1 {
        font-size: clamp(15px, 1.5vw, 18px);
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .brand p {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }
      .shop-selector {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .shop-selector label {
        font-size: 10px;
        color: var(--text3);
        display: block;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .shop-selector select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid var(--border-md);
        border-radius: var(--r-sm);
        background: var(--bg);
        color: var(--text);
        font-size: 12px;
      }
      .nav {
        flex: 1;
        overflow-y: auto;
        padding: 8px 6px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: var(--r-sm);
        color: var(--text2);
        font-size: 13px;
        border: none;
        background: transparent;
        width: 100%;
        text-align: left;
        transition: all 0.12s;
        white-space: nowrap;
      }
      .nav-item:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .nav-item.active {
        background: var(--accent-bg);
        color: var(--accent-text);
        font-weight: 500;
      }
      .nav-item .ico {
        font-size: 16px;
        width: 20px;
        text-align: center;
        flex-shrink: 0;
      }
      .nav-sep {
        height: 1px;
        background: var(--border);
        margin: 5px 0;
        flex-shrink: 0;
      }
      .sidebar-foot {
        padding: 10px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .add-shop-btn {
        width: 100%;
        padding: 8px;
        border-radius: var(--r-sm);
        border: 1px dashed var(--border-md);
        background: transparent;
        color: var(--text2);
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .add-shop-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* TOPBAR */
      .topbar {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--topbar);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        z-index: 300;
        flex-shrink: 0;
      }
      .topbar-title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .topbar-shop {
        font-size: 12px;
        color: var(--text2);
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .menu-btn {
        width: 36px;
        height: 36px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        border: none;
        background: transparent;
        padding: 0;
      }
      .menu-btn span {
        display: block;
        width: 20px;
        height: 2px;
        background: var(--text);
        border-radius: 2px;
        transition: all 0.2s;
      }
      .menu-btn.open span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
      }
      .menu-btn.open span:nth-child(2) {
        opacity: 0;
      }
      .menu-btn.open span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px);
      }

      /* DRAWER OVERLAY */
      .drawer-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 199;
        opacity: 0;
        transition: opacity 0.25s;
      }
      .drawer-overlay.show {
        opacity: 1;
      }

      /* BOTTOM NAV */
      .bottom-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--bottomnav);
        background: var(--surface);
        border-top: 1px solid var(--border);
        justify-content: space-around;
        align-items: center;
        z-index: 300;
        padding: 0 4px;
        padding-bottom: env(safe-area-inset-bottom);
      }
      .bnav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        flex: 1;
        padding: 5px 2px;
        border: none;
        background: transparent;
        color: var(--text3);
        font-size: 10px;
        border-radius: var(--r-sm);
        min-width: 0;
      }
      .bnav-item .bico {
        font-size: 20px;
        line-height: 1;
      }
      .bnav-item.active {
        color: var(--accent);
      }

      /* CONTENT */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      /* PAGE HEADER */
      .page-header {
        padding: clamp(12px, 2vw, 16px) clamp(14px, 2.5vw, 24px);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        flex-wrap: wrap;
        gap: 10px;
      }
      .page-header h2 {
        font-size: clamp(14px, 1.8vw, 17px);
        font-weight: 600;
      }
      .page-header p {
        font-size: 12px;
        color: var(--text3);
        margin-top: 2px;
      }
      .header-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      /* PAGE BODY */
      .page-body {
        flex: 1;
        overflow-y: auto;
        padding: clamp(12px, 2vw, 20px) clamp(12px, 2.5vw, 24px);
      }

      /* BUTTONS */
      .btn {
        padding: clamp(7px, 1vw, 9px) clamp(12px, 1.5vw, 16px);
        border-radius: var(--r-sm);
        font-size: clamp(12px, 1.2vw, 13px);
        font-weight: 500;
        border: none;
        transition: all 0.12s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.88;
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .btn-secondary {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border-md);
      }
      .btn-secondary:hover {
        background: #e4e2da;
      }
      .btn-secondary:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .btn-danger {
        background: var(--red-bg);
        color: var(--red);
        border: 1px solid rgba(163, 45, 45, 0.2);
      }
      .btn-green {
        background: var(--green-bg);
        color: var(--green);
        border: 1px solid rgba(59, 109, 17, 0.2);
      }
      .btn-amber {
        background: var(--amber-bg);
        color: var(--amber);
        border: 1px solid rgba(133, 79, 11, 0.2);
      }
      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
      }
      .btn-xs {
        padding: 4px 8px;
        font-size: 11px;
      }
      .btn-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--r-sm);
        border: 1px solid var(--border-md);
        background: transparent;
        font-size: 15px;
        color: var(--text2);
        flex-shrink: 0;
      }
      .btn-icon:hover {
        background: var(--surface2);
      }
      .btn-block {
        width: 100%;
      }

      /* BADGES */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
        white-space: nowrap;
      }
      .badge-blue {
        background: var(--accent-bg);
        color: var(--accent-text);
      }
      .badge-green {
        background: var(--green-bg);
        color: var(--green);
      }
      .badge-amber {
        background: var(--amber-bg);
        color: var(--amber);
      }
      .badge-red {
        background: var(--red-bg);
        color: var(--red);
      }
      .badge-gray {
        background: var(--surface2);
        color: var(--text2);
      }

      /* METRICS */
      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(160px, 45%), 1fr));
        gap: clamp(8px, 1.5vw, 14px);
        margin-bottom: clamp(12px, 2vw, 20px);
      }
      .metric-card {
        background: var(--surface);
        border-radius: var(--r);
        border: 1px solid var(--border);
        padding: clamp(12px, 1.5vw, 16px);
      }
      .metric-label {
        font-size: 11px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .metric-val {
        font-size: clamp(18px, 3vw, 26px);
        font-weight: 700;
      }
      .metric-sub {
        font-size: 11px;
        color: var(--text3);
        margin-top: 4px;
      }

      /* DATA TABLE */
      .table-wrap {
        background: var(--surface);
        border-radius: var(--r);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .table-scroll {
        overflow-x: auto;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 360px;
      }
      .data-table th {
        text-align: left;
        padding: 9px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text3);
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      .data-table td {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
        font-size: 13px;
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tbody tr:hover td {
        background: var(--surface2);
      }

      /* FORMS */
      .form-group {
        margin-bottom: 13px;
      }
      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text2);
        margin-bottom: 5px;
      }
      .form-input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border-md);
        border-radius: var(--r-sm);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
        outline: none;
        transition: border 0.12s;
      }
      .form-input:focus {
        border-color: var(--accent);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: clamp(8px, 3vw, 20px);
      }
      .modal {
        background: var(--surface);
        border-radius: var(--r);
        width: 100%;
        max-width: 480px;
        max-height: 92dvh;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
      }
      .modal-head {
        padding: 15px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .modal-head h3 {
        font-size: 15px;
        font-weight: 600;
      }
      .modal-body {
        padding: 18px;
        flex: 1;
        overflow-y: auto;
      }
      .modal-foot {
        padding: 12px 18px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      /* BILLING */
      .billing-wrap {
        flex: 1;
        display: flex;
        overflow: hidden;
        min-height: 0;
      }
      .billing-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
        border-right: 1px solid var(--border);
      }
      .billing-right {
        width: clamp(260px, 28vw, 320px);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      .cat-bar {
        display: flex;
        overflow-x: auto;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .cat-bar::-webkit-scrollbar {
        height: 0;
      }
      .cat-pill {
        padding: 10px clamp(10px, 1.5vw, 14px);
        font-size: 12px;
        font-weight: 500;
        border: none;
        background: transparent;
        color: var(--text2);
        white-space: nowrap;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.12s;
      }
      .cat-pill.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .products-area {
        flex: 1;
        overflow-y: auto;
        padding: clamp(8px, 1.5vw, 14px);
      }
      .products-grid {
        display: grid;
        grid-template-columns: repeat(
          auto-fill,
          minmax(clamp(100px, 12vw, 150px), 1fr)
        );
        gap: clamp(6px, 1vw, 10px);
        align-content: start;
      }
      .prod-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: clamp(9px, 1.2vw, 12px);
        cursor: pointer;
        transition: all 0.12s;
        user-select: none;
      }
      .prod-card:hover,
      .prod-card:active {
        border-color: var(--accent);
        box-shadow: 0 2px 8px rgba(24, 95, 165, 0.12);
        transform: translateY(-1px);
      }
      .prod-card.low-stock {
        border-color: rgba(133, 79, 11, 0.3);
      }
      .prod-name {
        font-size: clamp(11px, 1.2vw, 13px);
        font-weight: 500;
        line-height: 1.3;
        margin-bottom: 4px;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .prod-price {
        font-size: clamp(13px, 1.4vw, 15px);
        font-weight: 700;
        color: var(--accent);
      }
      .prod-stock {
        font-size: 10px;
        color: var(--text3);
        margin-top: 3px;
      }

      /* CART */
      .cart-head {
        padding: 11px 13px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .cart-head h3 {
        font-size: 13px;
        font-weight: 600;
      }
      .cart-cust {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 8px 10px;
        min-height: 0;
      }
      .cart-empty {
        padding: 24px;
        text-align: center;
        color: var(--text3);
        font-size: 12px;
      }
      .cart-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }
      .cart-row:last-child {
        border-bottom: none;
      }
      .cart-name {
        flex: 1;
        font-size: 12px;
        line-height: 1.3;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        gap: 3px;
        flex-shrink: 0;
      }
      .qty-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid var(--border-md);
        background: transparent;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text2);
        transition: all 0.12s;
      }
      .qty-btn:hover,
      .qty-btn:active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .qty-num {
        font-size: 12px;
        font-weight: 600;
        width: 18px;
        text-align: center;
      }
      .cart-price {
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        min-width: 44px;
        text-align: right;
      }
      .cart-summary {
        padding: 10px 12px;
        border-top: 1px solid var(--border);
        background: var(--surface2);
        flex-shrink: 0;
      }
      .sum-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--text2);
        margin-bottom: 3px;
      }
      .sum-total {
        display: flex;
        justify-content: space-between;
        font-size: 15px;
        font-weight: 700;
        margin: 7px 0;
        padding-top: 7px;
        border-top: 1px solid var(--border-md);
      }
      .cart-actions {
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        flex-shrink: 0;
      }
      .pay-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
      }
      .pay-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 8px 4px;
        border-radius: var(--r-sm);
        font-size: 12px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: all 0.12s;
      }
      .pay-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* TABLES PANEL */
      .tables-panel {
        width: clamp(120px, 16vw, 180px);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }
      .tables-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .tables-mini-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .tbl-card {
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 8px 4px;
        text-align: center;
        cursor: pointer;
        transition: all 0.12s;
      }
      .tbl-card:hover {
        border-color: var(--accent);
      }
      .tbl-card.occupied {
        border-color: var(--green);
        background: var(--green-bg);
      }
      .tbl-card.occupied .t-n {
        color: var(--green);
      }
      .tbl-card.selected {
        border-color: var(--accent);
        background: var(--accent-bg);
      }
      .tbl-card.selected .t-n {
        color: var(--accent);
      }
      .t-n {
        font-size: clamp(14px, 1.5vw, 18px);
        font-weight: 700;
      }
      .t-l {
        font-size: 9px;
        color: var(--text3);
        margin-top: 1px;
      }
      .t-a {
        font-size: 10px;
        font-weight: 600;
        color: var(--green);
        margin-top: 2px;
      }

      /* KHATA */
      .khata-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(220px, 100%), 1fr));
        gap: 12px;
      }
      .khata-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 14px;
      }

      /* STOCK */
      .stock-bar {
        height: 4px;
        border-radius: 3px;
        background: var(--border);
        margin-top: 4px;
        overflow: hidden;
        min-width: 60px;
      }
      .stock-fill {
        height: 100%;
        border-radius: 3px;
        background: var(--green);
      }
      .stock-fill.warn {
        background: #ef9f27;
      }
      .stock-fill.crit {
        background: #e24b4a;
      }

      /* RECEIPT */
      .receipt-wrap {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: clamp(14px, 3vw, 20px);
        max-width: 340px;
        margin: 0 auto;
        font-size: 13px;
      }
      .rcpt-head {
        text-align: center;
        padding-bottom: 12px;
        border-bottom: 1px dashed var(--border-md);
        margin-bottom: 12px;
      }
      .rcpt-shop {
        font-size: 17px;
        font-weight: 700;
      }
      .rcpt-table {
        width: 100%;
        border-collapse: collapse;
      }
      .rcpt-table td {
        padding: 4px 2px;
        font-size: 12px;
      }
      .rcpt-foot {
        border-top: 1px dashed var(--border-md);
        margin-top: 10px;
        padding-top: 10px;
        text-align: center;
        color: var(--text3);
        font-size: 11px;
      }

      /* SETUP */
      .setup-outer {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(14px, 4vw, 40px);
        overflow-y: auto;
      }
      .setup-card {
        background: var(--surface);
        border-radius: var(--r);
        border: 1px solid var(--border);
        padding: clamp(18px, 4vw, 32px);
        width: 100%;
        max-width: 520px;
      }
      .setup-card h2 {
        font-size: clamp(16px, 2.5vw, 20px);
        font-weight: 700;
        margin-bottom: 4px;
      }
      .setup-card > p {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 20px;
      }
      .shop-type-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(130px, 45%), 1fr));
        gap: 8px;
        margin-bottom: 18px;
      }
      .stype-opt {
        border: 1px solid var(--border-md);
        border-radius: var(--r);
        padding: clamp(10px, 2vw, 14px);
        cursor: pointer;
        transition: all 0.12s;
        text-align: center;
        user-select: none;
      }
      .stype-opt:hover {
        border-color: var(--accent);
      }
      .stype-opt.selected {
        border-color: var(--accent);
        background: var(--accent-bg);
      }
      .stype-opt .si {
        font-size: clamp(20px, 3.5vw, 28px);
        margin-bottom: 5px;
      }
      .stype-opt .sl {
        font-size: clamp(11px, 1.3vw, 12px);
        font-weight: 500;
      }
      .stype-opt .sd {
        font-size: 10px;
        color: var(--text3);
        margin-top: 2px;
      }

      /* FLOAT CART */
      .float-cart {
        display: none;
        position: fixed;
        bottom: calc(var(--bottomnav) + 10px);
        right: 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 50px;
        padding: 11px 18px;
        font-size: 13px;
        font-weight: 600;
        z-index: 299;
        box-shadow: 0 4px 16px rgba(24, 95, 165, 0.35);
        align-items: center;
        gap: 6px;
      }
      .fc-count {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 20px;
        padding: 1px 7px;
        font-size: 11px;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: clamp(70px, 12vw, 24px);
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a18;
        color: #fff;
        padding: 9px 18px;
        border-radius: var(--r-sm);
        font-size: 13px;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
        white-space: nowrap;
        max-width: 90vw;
        text-align: center;
      }

      /* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */

      /* TABLET & MOBILE */
      @media (max-width: 768px) {
        .topbar {
          display: flex;
        }
        .bottom-nav {
          display: flex;
        }
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          transform: translateX(-100%);
          width: min(280px, 80vw);
          box-shadow: 4px 0 20px rgba(0, 0, 0, 0.12);
          padding-top: var(--topbar);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .drawer-overlay {
          display: block;
        }
        .content {
          padding-top: var(--topbar);
          padding-bottom: var(--bottomnav);
        }
        .billing-right {
          display: none;
        }
        .billing-right.cart-open {
          display: flex;
          position: fixed;
          top: var(--topbar);
          bottom: var(--bottomnav);
          right: 0;
          width: min(320px, 100vw);
          z-index: 250;
          box-shadow: -4px 0 20px rgba(0, 0, 0, 0.12);
        }
        .float-cart {
          display: flex;
        }
        .metrics-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* MOBILE */
      @media (max-width: 480px) {
        .billing-right.cart-open {
          width: 100vw;
        }
        .tables-panel {
          width: 110px;
        }
        .tables-mini-grid {
          grid-template-columns: 1fr 1fr;
        }
        .products-grid {
          grid-template-columns: repeat(auto-fill, minmax(min(95px, 45%), 1fr));
        }
        .modal {
          max-height: 95dvh;
          border-radius: var(--r) var(--r) 0 0;
          margin-top: auto;
          align-self: flex-end;
        }
        .modal-overlay {
          align-items: flex-end;
          padding: 0;
        }
        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }
        .khata-grid {
          grid-template-columns: 1fr;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      /* SMALL MOBILE */
      @media (max-width: 360px) {
        :root {
          --bottomnav: 54px;
        }
        .bnav-item {
          font-size: 9px;
        }
        .bnav-item .bico {
          font-size: 17px;
        }
        .metrics-grid {
          grid-template-columns: 1fr 1fr;
        }
        .products-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* LARGE DESKTOP */
      @media (min-width: 1400px) {
        :root {
          --sidebar: 240px;
        }
        .billing-right {
          width: 340px;
        }
        .products-grid {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }
        .metrics-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      /* EXTRA LARGE */
      @media (min-width: 1800px) {
        :root {
          --sidebar: 260px;
        }
        .billing-right {
          width: 380px;
        }
        body {
          font-size: 15px;
        }
      }

      @media print {
        .topbar,
        .sidebar,
        .bottom-nav,
        .float-cart,
        .toast {
          display: none !important;
        }
        .modal-overlay {
          position: static !important;
          background: none !important;
          padding: 0 !important;
        }
        .modal {
          box-shadow: none !important;
          max-height: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>
    <div
      class="drawer-overlay"
      id="drawer-overlay"
      onclick="closeSidebar()"
    ></div>
    <div class="toast" id="toast"></div>

    <script>
      const S = {
        shops: [],
        currentShop: null,
        page: "dashboard",
        cart: [],
        selTable: null,
        activeCat: null,
        modal: null,
        bills: [],
        khata: [],
        sidebarOpen: false,
        cartOpen: false,
      };

      const TMPL = {
        restaurant: {
          label: "Restaurant/Cafe",
          icon: "🍽️",
          mode: "table",
          cats: ["Starters", "Mains", "Breads", "Beverages", "Desserts"],
          gst: 5,
        },
        cafe: {
          label: "Tea/Coffee Shop",
          icon: "☕",
          mode: "counter",
          cats: ["Hot Drinks", "Cold Drinks", "Snacks", "Bakery"],
          gst: 5,
        },
        hardware: {
          label: "Hardware Store",
          icon: "🔧",
          mode: "counter",
          cats: ["Pipes", "Fittings", "Electrical", "Tools", "Paint"],
          gst: 12,
        },
        grocery: {
          label: "Malligai/Grocery",
          icon: "🛒",
          mode: "counter",
          cats: ["Vegetables", "Fruits", "Staples", "Dairy", "Spices"],
          gst: 0,
        },
        petty: {
          label: "Petty Shop",
          icon: "🏪",
          mode: "counter",
          cats: ["Snacks", "Beverages", "Stationery", "Personal Care", "Misc"],
          gst: 0,
        },
        custom: {
          label: "Custom Shop",
          icon: "⚙️",
          mode: "counter",
          cats: ["General"],
          gst: 0,
        },
      };

      const PAGES = [
        { id: "dashboard", ico: "📊", label: "Dashboard" },
        { id: "billing", ico: "🧾", label: "Billing" },
        { id: "inventory", ico: "📦", label: "Products" },
        { id: "khata", ico: "📒", label: "Khata" },
        { id: "bills", ico: "📋", label: "History" },
        { id: "settings", ico: "⚙️", label: "Settings" },
      ];

      const uid = () => Math.random().toString(36).slice(2, 9);
      const fmt = (n) =>
        "₹" +
        Number(n || 0).toLocaleString("en-IN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        });
      const shop = () => S.shops.find((s) => s.id === S.currentShop);
      const prods = () => shop()?.products || [];
      const cats = () => [...new Set(prods().map((p) => p.cat))];
      const sub = () => S.cart.reduce((a, i) => a + i.price * i.qty, 0);
      const gstAmt = () =>
        Math.round(((sub() * (shop()?.gst || 0)) / 100) * 100) / 100;
      const total = () => sub() + gstAmt();
      const isMobile = () => window.innerWidth <= 768;

      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.style.opacity = 1;
        clearTimeout(el._t);
        el._t = setTimeout(() => (el.style.opacity = 0), 2200);
      }

      function openSidebar() {
        S.sidebarOpen = true;
        document.querySelector(".sidebar")?.classList.add("open");
        const ov = document.getElementById("drawer-overlay");
        if (ov) {
          ov.classList.add("show");
          ov.style.display = "block";
        }
        document.querySelector(".menu-btn")?.classList.add("open");
      }
      function closeSidebar() {
        S.sidebarOpen = false;
        document.querySelector(".sidebar")?.classList.remove("open");
        const ov = document.getElementById("drawer-overlay");
        if (ov) {
          ov.classList.remove("show");
          setTimeout(() => {
            if (!S.sidebarOpen) ov.style.display = "none";
          }, 250);
        }
        document.querySelector(".menu-btn")?.classList.remove("open");
      }
      function toggleSidebar() {
        S.sidebarOpen ? closeSidebar() : openSidebar();
      }

      function addToCart(p) {
        const ex = S.cart.find((x) => x.id === p.id);
        if (ex) ex.qty++;
        else S.cart.push({ ...p, qty: 1 });
        if (isMobile()) S.cartOpen = true;
        refreshBilling();
      }
      function changeQty(id, d) {
        const ex = S.cart.find((x) => x.id === id);
        if (!ex) return;
        ex.qty += d;
        if (ex.qty <= 0) S.cart = S.cart.filter((x) => x.id !== id);
        refreshBilling();
      }
      function clearCart() {
        S.cart = [];
        S.selTable = null;
        S.cartOpen = false;
        refreshBilling();
      }

      function settleBill(mode) {
        if (!S.cart.length) {
          toast("Cart is empty");
          return;
        }
        const s = shop();
        const bill = {
          id: uid(),
          shop: s.id,
          shopName: s.name,
          items: S.cart.map((x) => ({ ...x })),
          subtotal: sub(),
          gst: gstAmt(),
          total: total(),
          payMode: mode,
          table: S.selTable,
          time: new Date().toISOString(),
        };
        S.bills.push(bill);
        if (s.mode === "table" && S.selTable != null) {
          s.tables[S.selTable].status = "free";
          s.tables[S.selTable].order = [];
        }
        S.cart.forEach((ci) => {
          const p = s.products.find((p) => p.id === ci.id);
          if (p && p.stock != null) p.stock = Math.max(0, p.stock - ci.qty);
        });
        S.cart = [];
        S.selTable = null;
        S.cartOpen = false;
        S.modal = { type: "receipt", bill };
        render();
        toast("Bill settled ✓");
      }

      function addShop(d) {
        const t = TMPL[d.type];
        S.shops.push({
          id: uid(),
          name: d.name,
          type: d.type,
          mode: d.mode || t.mode,
          gst: parseFloat(d.gst ?? t.gst),
          products: [],
          cats: [...t.cats],
          tables:
            d.mode === "table"
              ? Array.from({ length: parseInt(d.tables || 8) }, (_, i) => ({
                  num: i + 1,
                  status: "free",
                  order: [],
                }))
              : [],
        });
        S.currentShop = S.shops[S.shops.length - 1].id;
        S.page = "billing";
        S.modal = null;
        _selType = null;
        render();
        toast("Shop created!");
      }
      function addProduct(d) {
        shop().products.push({
          id: uid(),
          name: d.name,
          price: parseFloat(d.price),
          cat: d.cat || "General",
          stock: d.stock ? parseInt(d.stock) : null,
          unit: d.unit || "pcs",
        });
        render();
        toast("Product added");
      }
      function editProduct(id, d) {
        const p = shop().products.find((x) => x.id === id);
        if (p) {
          p.name = d.name;
          p.price = parseFloat(d.price);
          p.cat = d.cat;
          p.stock = d.stock ? parseInt(d.stock) : null;
          p.unit = d.unit;
        }
        render();
        toast("Updated ✓");
      }
      function deleteProduct(id) {
        if (!confirm("Delete this product?")) return;
        shop().products = shop().products.filter((p) => p.id !== id);
        render();
        toast("Deleted");
      }
      function addKhata(d) {
        S.khata.push({
          id: uid(),
          shop: S.currentShop,
          name: d.name,
          phone: d.phone || "",
          amount: parseFloat(d.amount),
          note: d.note || "",
          date: new Date().toISOString(),
          paid: false,
        });
        S.modal = null;
        render();
        toast("Khata entry added");
      }
      function markPaid(id) {
        const k = S.khata.find((x) => x.id === id);
        if (k) {
          k.paid = true;
          render();
          toast("Marked as paid ✓");
        }
      }

      function render() {
        const app = document.getElementById("app");
        if (!S.shops.length) {
          app.innerHTML = `<div class="content"><div class="setup-outer"><div class="setup-card"><h2>Welcome to BillFlow</h2><p>Set up your first shop to get started billing.</p>${shopFormHTML(true)}</div></div></div>`;
          bindSetup();
          return;
        }
        app.innerHTML =
          renderSidebar() +
          renderTopbar() +
          renderBottomNav() +
          `<div class="content">${renderPage()}</div>`;
        bindNav();
        if (S.modal) attachModal();
      }

      function refreshBilling() {
        const bw = document.getElementById("billing-wrap");
        if (!bw || S.page !== "billing") return;
        const s = shop();
        bw.innerHTML =
          (s.mode === "table" ? tableLeftHTML(s) : counterLeftHTML(s)) +
          cartHTML();
        const cr = document.querySelector(".billing-right");
        if (cr && isMobile()) cr.classList.toggle("cart-open", S.cartOpen);
        const fc = document.getElementById("float-cart");
        if (fc) {
          const n = S.cart.reduce((a, i) => a + i.qty, 0);
          fc.innerHTML = `🧾 Cart <span class="fc-count">${n}</span>`;
        }
      }

      let _selType = null;
      function shopFormHTML(isFirst) {
        return `<div id="sf">
    <div class="shop-type-grid">${Object.entries(TMPL)
      .map(
        ([k, v]) =>
          `<div class="stype-opt${_selType === k ? " selected" : ""}" onclick="pickType(this,'${k}')"><div class="si">${v.icon}</div><div class="sl">${v.label}</div><div class="sd">${v.mode}</div></div>`,
      )
      .join("")}</div>
    <div class="form-group"><label class="form-label">Shop Name *</label><input class="form-input" id="sf-name" placeholder="e.g. Murugan Stores" autocomplete="off"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">GST %</label><input class="form-input" id="sf-gst" type="number" value="0" min="0" max="28"></div>
      <div class="form-group"><label class="form-label">Mode</label><select class="form-input" id="sf-mode" onchange="onModeChg()"><option value="counter">Counter</option><option value="table">Table</option></select></div>
    </div>
    <div class="form-group" id="sf-tw" style="display:none"><label class="form-label">Number of Tables</label><input class="form-input" id="sf-tables" type="number" value="8" min="1" max="60"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px">
      ${!isFirst ? `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>` : ""}
      <button class="btn btn-primary" onclick="submitShop()">Create Shop →</button>
    </div>
  </div>`;
      }
      function pickType(el, k) {
        document
          .querySelectorAll(".stype-opt")
          .forEach((e) => e.classList.remove("selected"));
        el.classList.add("selected");
        _selType = k;
        const t = TMPL[k];
        const g = document.getElementById("sf-gst"),
          m = document.getElementById("sf-mode");
        if (g) g.value = t.gst;
        if (m) {
          m.value = t.mode;
          onModeChg();
        }
      }
      function onModeChg() {
        const m = document.getElementById("sf-mode"),
          w = document.getElementById("sf-tw");
        if (m && w) w.style.display = m.value === "table" ? "" : "none";
      }
      function bindSetup() {
        const m = document.getElementById("sf-mode");
        if (m) m.addEventListener("change", onModeChg);
      }
      function submitShop() {
        const name = (document.getElementById("sf-name")?.value || "").trim();
        if (!name) {
          toast("Enter a shop name");
          return;
        }
        if (!_selType) {
          toast("Select a shop type");
          return;
        }
        const mode =
          document.getElementById("sf-mode")?.value || TMPL[_selType].mode;
        addShop({
          name,
          type: _selType,
          mode,
          gst: document.getElementById("sf-gst")?.value ?? 0,
          tables: document.getElementById("sf-tables")?.value ?? 8,
        });
      }

      function renderSidebar() {
        const shopOpts = S.shops
          .map(
            (sh) =>
              `<option value="${sh.id}"${sh.id === S.currentShop ? " selected" : ""}>${sh.name}</option>`,
          )
          .join("");
        return `<aside class="sidebar${S.sidebarOpen ? " open" : ""}">
    <div class="brand"><h1>BillFlow</h1><p>Universal Billing</p></div>
    <div class="shop-selector"><label>Active Shop</label><select onchange="switchShop(this.value)">${shopOpts}</select></div>
    <nav class="nav">${PAGES.map((p) => `<button class="nav-item${S.page === p.id ? " active" : ""}" data-page="${p.id}"><span class="ico">${p.ico}</span>${p.label}</button>`).join("")}<div class="nav-sep"></div><button class="nav-item" onclick="showAddShop()"><span class="ico">➕</span>Add Shop</button></nav>
    <div class="sidebar-foot"><button class="add-shop-btn" onclick="showAddShop()">＋ New Shop</button></div>
  </aside>`;
      }

      function renderTopbar() {
        const s = shop();
        return `<header class="topbar">
    <button class="menu-btn${S.sidebarOpen ? " open" : ""}" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <div style="flex:1;margin:0 10px;min-width:0"><div class="topbar-title">BillFlow</div><div class="topbar-shop">${s?.name || ""}</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      ${S.page === "billing" ? `<button class="btn btn-sm btn-secondary" onclick="showAddProduct()">＋</button>` : ""}
      <select style="padding:5px 6px;border:1px solid var(--border-md);border-radius:var(--r-sm);background:var(--bg);font-size:11px;max-width:90px" onchange="switchShop(this.value)">${S.shops.map((sh) => `<option value="${sh.id}"${sh.id === S.currentShop ? " selected" : ""}>${sh.name}</option>`).join("")}</select>
    </div>
  </header>`;
      }

      function renderBottomNav() {
        return `<nav class="bottom-nav">${PAGES.map((p) => `<button class="bnav-item${S.page === p.id ? " active" : ""}" data-page="${p.id}"><div class="bico">${p.ico}</div>${p.label}</button>`).join("")}</nav>`;
      }

      function renderPage() {
        const map = {
          dashboard: dashboardHTML,
          billing: billingHTML,
          inventory: inventoryHTML,
          khata: khataHTML,
          bills: billsHTML,
          settings: settingsHTML,
        };
        return (map[S.page] || dashboardHTML)();
      }

      function dashboardHTML() {
        const s = shop(),
          today = new Date().toISOString().slice(0, 10);
        const tB = S.bills.filter(
          (b) => b.shop === s.id && b.time.startsWith(today),
        );
        const rev = tB.reduce((a, b) => a + b.total, 0);
        const kP = S.khata
          .filter((k) => k.shop === s.id && !k.paid)
          .reduce((a, k) => a + k.amount, 0);
        const ls = s.products.filter((p) => p.stock != null && p.stock <= 5);
        const aT =
          s.mode === "table"
            ? s.tables.filter((t) => t.status === "occupied").length
            : 0;
        const tm = {};
        tB.forEach((b) =>
          b.items.forEach((i) => (tm[i.name] = (tm[i.name] || 0) + i.qty)),
        );
        const tl = Object.entries(tm)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5);
        return `<div class="page-header"><div><h2>${s.name}</h2><p>${TMPL[s.type]?.label || s.type} · ${s.mode === "table" ? "Table Mode" : "Counter Mode"} · GST ${s.gst}%</p></div><div class="header-actions"><span class="badge badge-blue">${s.mode}</span></div></div>
  <div class="page-body">
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Revenue Today</div><div class="metric-val">${fmt(rev)}</div><div class="metric-sub">${tB.length} bills</div></div>
      <div class="metric-card"><div class="metric-label">Khata Pending</div><div class="metric-val" style="color:var(--red)">${fmt(kP)}</div><div class="metric-sub">${S.khata.filter((k) => k.shop === s.id && !k.paid).length} customers</div></div>
      <div class="metric-card"><div class="metric-label">Low Stock</div><div class="metric-val" style="color:var(--amber)">${ls.length}</div><div class="metric-sub">items</div></div>
      ${s.mode === "table" ? `<div class="metric-card"><div class="metric-label">Active Tables</div><div class="metric-val" style="color:var(--green)">${aT}</div><div class="metric-sub">of ${s.tables.length}</div></div>` : `<div class="metric-card"><div class="metric-label">Products</div><div class="metric-val">${s.products.length}</div><div class="metric-sub">in catalog</div></div>`}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:14px;margin-bottom:16px">
      <div class="table-wrap"><div style="padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600">Top Items Today</div>${tl.length ? `<div class="table-scroll"><table class="data-table"><thead><tr><th>Item</th><th>Sold</th></tr></thead><tbody>${tl.map(([n, q]) => `<tr><td>${n}</td><td><strong>${q}</strong></td></tr>`).join("")}</tbody></table></div>` : '<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No sales yet today</div>'}</div>
      <div class="table-wrap"><div style="padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600">Recent Bills</div>${
        tB.length
          ? `<div class="table-scroll"><table class="data-table"><thead><tr><th>Bill</th><th>Amount</th><th>Mode</th></tr></thead><tbody>${tB
              .slice(-5)
              .reverse()
              .map(
                (b) =>
                  `<tr><td style="font-family:monospace;font-size:11px">#${b.id.slice(0, 6).toUpperCase()}</td><td><strong>${fmt(b.total)}</strong></td><td><span class="badge badge-gray">${b.payMode}</span></td></tr>`,
              )
              .join("")}</tbody></table></div>`
          : '<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No bills yet</div>'
      }</div>
    </div>
    ${ls.length ? `<div style="background:var(--amber-bg);border:1px solid rgba(133,79,11,.2);border-radius:var(--r);padding:12px 14px"><div style="font-size:13px;font-weight:600;color:var(--amber);margin-bottom:8px">⚠ Low Stock Alert</div><div style="display:flex;flex-wrap:wrap;gap:6px">${ls.map((p) => `<span class="badge badge-amber">${p.name} (${p.stock} left)</span>`).join("")}</div></div>` : ""}
  </div>`;
      }

      function billingHTML() {
        const s = shop(),
          n = S.cart.reduce((a, i) => a + i.qty, 0);
        return `<div id="billing-wrap" class="billing-wrap">${s.mode === "table" ? tableLeftHTML(s) : counterLeftHTML(s)}${cartHTML()}</div>
  <button class="float-cart" id="float-cart" onclick="toggleCart()">🧾 Cart <span class="fc-count">${n}</span></button>`;
      }

      function counterLeftHTML(s) {
        const ac = S.activeCat || cats()[0];
        const fp = s.products.filter((p) => p.cat === ac);
        return `<div class="billing-left">
    <div style="padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <span style="font-size:13px;font-weight:600">Counter Billing</span>
      <button class="btn btn-sm btn-secondary" onclick="showAddProduct()">＋ Product</button>
    </div>
    <div class="cat-bar">${
      cats()
        .map(
          (c) =>
            `<button class="cat-pill${c === ac ? " active" : ""}" onclick="selCat('${c}')">${c}</button>`,
        )
        .join("") ||
      '<span style="padding:10px 14px;font-size:12px;color:var(--text3)">Add products to start</span>'
    }</div>
    <div class="products-area"><div class="products-grid">${fp.length ? fp.map((p) => pCard(p)).join("") : `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)"><div style="font-size:32px;margin-bottom:10px">📦</div>No products here.<br><button class="btn btn-sm btn-primary" style="margin-top:12px" onclick="showAddProduct()">Add Product</button></div>`}</div></div>
  </div>`;
      }

      function tableLeftHTML(s) {
        const ac = S.activeCat || cats()[0];
        const fp = s.products.filter((p) => p.cat === ac);
        const st = S.selTable;
        return `<div class="billing-left" style="flex-direction:row">
    <div class="tables-panel">
      <div style="padding:9px 10px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;flex-shrink:0;display:flex;align-items:center;justify-content:space-between"><span>Tables</span><span class="badge badge-green" style="font-size:10px">${s.tables.filter((t) => t.status === "occupied").length}</span></div>
      <div class="tables-scroll"><div class="tables-mini-grid">${s.tables.map((t, i) => `<div class="tbl-card${t.status === "occupied" ? " occupied" : ""}${st === i ? " selected" : ""}" onclick="selTable(${i})"><div class="t-n">${t.num}</div><div class="t-l">${t.status === "occupied" ? "Active" : "Free"}</div>${t.status === "occupied" ? `<div class="t-a">${fmt(t.order?.reduce((s, x) => s + x.price * x.qty, 0) || 0)}</div>` : ""}</div>`).join("")}</div></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
      <div style="padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <span style="font-size:13px;font-weight:600">${st != null ? `Table ${s.tables[st].num}` : "Select a table"}</span>
        <button class="btn btn-sm btn-secondary" onclick="showAddProduct()">＋ Product</button>
      </div>
      <div class="cat-bar">${cats()
        .map(
          (c) =>
            `<button class="cat-pill${c === ac ? " active" : ""}" onclick="selCat('${c}')">${c}</button>`,
        )
        .join("")}</div>
      <div class="products-area"><div class="products-grid">${st != null ? (fp.length ? fp.map((p) => pCard(p)).join("") : '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text3)">No products here</div>') : '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3)"><div style="font-size:32px;margin-bottom:10px">👆</div>Select a table to start</div>'}</div></div>
    </div>
  </div>`;
      }

      function pCard(p) {
        const low = p.stock != null && p.stock <= 5;
        const safe = JSON.stringify(p)
          .replace(/\\/g, "\\\\")
          .replace(/'/g, "\\'")
          .replace(/"/g, "&quot;");
        return `<div class="prod-card${low ? " low-stock" : ""}" onclick="addToCart(JSON.parse(this.dataset.p))" data-p="${safe}"><div class="prod-name">${p.name}</div><div class="prod-price">${fmt(p.price)}</div>${p.stock != null ? `<div class="prod-stock">${p.stock} ${p.unit} left</div>` : ""}</div>`;
      }

      function cartHTML() {
        const s = shop(),
          n = S.cart.reduce((a, i) => a + i.qty, 0);
        return `<div class="billing-right${isMobile() && S.cartOpen ? " cart-open" : ""}">
    <div class="cart-head"><h3>Bill${S.selTable != null ? ` · T${s.tables[S.selTable].num}` : ""}</h3><div style="display:flex;align-items:center;gap:6px">${n ? `<span class="badge badge-blue">${n}</span>` : ""}<button class="btn-icon" style="display:${isMobile() ? "flex" : "none"}" onclick="toggleCart()">✕</button></div></div>
    <div class="cart-cust"><input class="form-input" id="cust" placeholder="Customer name (optional)" style="font-size:12px"></div>
    <div class="cart-items">${S.cart.length ? S.cart.map((i) => `<div class="cart-row"><div class="cart-name" title="${i.name}">${i.name}</div><div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${i.id}',-1)">−</button><div class="qty-num">${i.qty}</div><button class="qty-btn" onclick="changeQty('${i.id}',1)">+</button></div><div class="cart-price">${fmt(i.price * i.qty)}</div></div>`).join("") : '<div class="cart-empty">👈 Tap items to add</div>'}</div>
    <div class="cart-summary"><div class="sum-row"><span>Subtotal</span><span>${fmt(sub())}</span></div>${s.gst > 0 ? `<div class="sum-row"><span>GST (${s.gst}%)</span><span>${fmt(gstAmt())}</span></div>` : ""}<div class="sum-total"><span>Total</span><span>${fmt(total())}</span></div></div>
    <div class="cart-actions">
      <div class="pay-grid">
        <button class="pay-btn btn-primary" onclick="settleBill('cash')"${!S.cart.length ? " disabled" : ""}>💵 Cash</button>
        <button class="pay-btn" style="background:var(--green-bg);color:var(--green);border:1px solid rgba(59,109,17,.2)" onclick="settleBill('upi')"${!S.cart.length ? " disabled" : ""}>📱 UPI</button>
      </div>
      <div class="pay-grid">
        <button class="pay-btn btn-secondary" onclick="settleBill('card')"${!S.cart.length ? " disabled" : ""}>💳 Card</button>
        <button class="pay-btn btn-amber" onclick="showKhataSettle()"${!S.cart.length ? " disabled" : ""}>📒 Khata</button>
      </div>
      <button class="btn btn-sm btn-danger btn-block" onclick="clearCart()">Clear Cart</button>
    </div>
  </div>`;
      }

      function toggleCart() {
        S.cartOpen = !S.cartOpen;
        const cr = document.querySelector(".billing-right");
        if (cr) cr.classList.toggle("cart-open", S.cartOpen);
      }

      function inventoryHTML() {
        const s = shop(),
          cl = cats();
        return `<div class="page-header"><div><h2>Products & Inventory</h2><p>${s.products.length} products · ${cl.length} categories</p></div><div class="header-actions"><button class="btn btn-primary" onclick="showAddProduct()">＋ Add Product</button></div></div>
  <div class="page-body">${
    cl.length
      ? cl
          .map((cat) => {
            const ps = s.products.filter((p) => p.cat === cat);
            return `<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${cat}</div><div class="table-wrap"><div class="table-scroll"><table class="data-table"><thead><tr><th>Product</th><th>Price</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody>${ps
              .map((p) => {
                const pct =
                  p.stock != null ? Math.min(100, (p.stock / 50) * 100) : null;
                const cls =
                  pct != null
                    ? pct <= 10
                      ? "crit"
                      : pct <= 30
                        ? "warn"
                        : ""
                    : "";
                return `<tr><td style="font-weight:500">${p.name}</td><td>${fmt(p.price)}</td><td>${p.stock != null ? `<span>${p.stock} ${p.unit}</span><div class="stock-bar"><div class="stock-fill ${cls}" style="width:${pct || 0}%"></div></div>` : "∞"}</td><td>${p.stock === 0 ? '<span class="badge badge-red">Out</span>' : p.stock != null && p.stock <= 5 ? '<span class="badge badge-amber">Low</span>' : '<span class="badge badge-green">OK</span>'}</td><td><div style="display:flex;gap:5px"><button class="btn-icon" onclick="showEditProduct('${p.id}')">✏️</button><button class="btn-icon" onclick="deleteProduct('${p.id}')">🗑️</button></div></td></tr>`;
              })
              .join("")}</tbody></table></div></div></div>`;
          })
          .join("")
      : `<div style="text-align:center;padding:60px;color:var(--text3)"><div style="font-size:48px;margin-bottom:14px">📦</div><p>No products yet.</p><button class="btn btn-primary" style="margin-top:16px" onclick="showAddProduct()">Add First Product</button></div>`
  }</div>`;
      }

      function khataHTML() {
        const en = S.khata.filter((k) => k.shop === S.currentShop),
          pe = en.filter((k) => !k.paid),
          tot = pe.reduce((s, k) => s + k.amount, 0);
        return `<div class="page-header"><div><h2>Khata / Credit Book</h2><p>${pe.length} pending · ${fmt(tot)}</p></div><div class="header-actions"><button class="btn btn-primary" onclick="showAddKhata()">＋ Add Entry</button></div></div>
  <div class="page-body">${pe.length ? `<div class="khata-grid">${pe.map((k) => `<div class="khata-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div><div style="font-size:14px;font-weight:600;margin-bottom:2px">${k.name}</div><div style="font-size:12px;color:var(--text3)">${k.phone || "No phone"}</div></div><span class="badge badge-red">Pending</span></div><div style="font-size:22px;font-weight:700;color:var(--red);margin:8px 0">${fmt(k.amount)}</div>${k.note ? `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">${k.note}</div>` : ""}<div style="display:flex;align-items:center;justify-content:space-between"><button class="btn btn-sm btn-green" onclick="markPaid('${k.id}')">✓ Mark Paid</button><span style="font-size:11px;color:var(--text3)">${new Date(k.date).toLocaleDateString("en-IN")}</span></div></div>`).join("")}</div>` : `<div style="text-align:center;padding:60px;color:var(--text3)"><div style="font-size:48px;margin-bottom:14px">📒</div><p>No pending entries</p></div>`}
  ${
    en.filter((k) => k.paid).length
      ? `<div style="margin-top:20px"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Settled</div><div class="table-wrap"><div class="table-scroll"><table class="data-table"><thead><tr><th>Customer</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>${en
          .filter((k) => k.paid)
          .map(
            (k) =>
              `<tr><td>${k.name}</td><td>${fmt(k.amount)}</td><td>${new Date(k.date).toLocaleDateString("en-IN")}</td><td><span class="badge badge-green">Paid</span></td></tr>`,
          )
          .join("")}</tbody></table></div></div></div>`
      : ""
  }
  </div>`;
      }

      function billsHTML() {
        const bl = S.bills.filter((b) => b.shop === S.currentShop).reverse(),
          tot = bl.reduce((s, b) => s + b.total, 0);
        return `<div class="page-header"><div><h2>Bill History</h2><p>${bl.length} bills · ${fmt(tot)}</p></div></div>
  <div class="page-body">${bl.length ? `<div class="table-wrap"><div class="table-scroll"><table class="data-table"><thead><tr><th>Bill #</th><th>Items</th><th>Subtotal</th><th>GST</th><th>Total</th><th>Payment</th><th>Time</th><th></th></tr></thead><tbody>${bl.map((b) => `<tr><td style="font-family:monospace;font-size:11px;font-weight:600">#${b.id.slice(0, 6).toUpperCase()}</td><td>${b.items.length}</td><td>${fmt(b.subtotal)}</td><td>${fmt(b.gst)}</td><td style="font-weight:700">${fmt(b.total)}</td><td><span class="badge badge-blue">${b.payMode}</span></td><td style="font-size:11px;color:var(--text3)">${new Date(b.time).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" })}</td><td><button class="btn btn-xs btn-secondary" onclick="showReceipt('${b.id}')">Receipt</button></td></tr>`).join("")}</tbody></table></div></div>` : `<div style="text-align:center;padding:60px;color:var(--text3)"><div style="font-size:48px;margin-bottom:14px">📋</div><p>No bills yet</p></div>`}</div>`;
      }

      function settingsHTML() {
        const s = shop();
        return `<div class="page-header"><div><h2>Settings</h2><p>${s.name}</p></div></div>
  <div class="page-body"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:14px;max-width:640px">
    <div class="table-wrap" style="padding:16px"><div style="font-size:13px;font-weight:600;margin-bottom:14px">Shop Info</div>
      <div class="form-group"><label class="form-label">Shop Name</label><input class="form-input" id="set-name" value="${s.name}"></div>
      <div class="form-group"><label class="form-label">GST %</label><input class="form-input" id="set-gst" type="number" value="${s.gst}" min="0" max="28"></div>
      <button class="btn btn-primary btn-sm" onclick="saveSettings()">Save Changes</button>
    </div>
    <div class="table-wrap" style="padding:16px"><div style="font-size:13px;font-weight:600;margin-bottom:12px">Details</div>
      ${[["Type", TMPL[s.type]?.label || s.type], ["Mode", s.mode], s.mode === "table" ? ["Tables", s.tables.length] : ["Products", s.products.length], ["ID", s.id.slice(0, 8) + "…"]].map(([k, v]) => `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><span style="color:var(--text2)">${k}</span><span style="font-weight:500">${v}</span></div>`).join("")}
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><button class="btn btn-sm btn-danger" onclick="if(confirm('Delete this shop?'))delShop()">🗑 Delete Shop</button></div>
    </div>
  </div></div>`;
      }
      function saveSettings() {
        const s = shop();
        const n = (document.getElementById("set-name")?.value || "").trim();
        const g = document.getElementById("set-gst")?.value;
        if (n) s.name = n;
        if (g !== undefined) s.gst = parseFloat(g) || 0;
        render();
        toast("Saved ✓");
      }
      function delShop() {
        S.shops = S.shops.filter((s) => s.id !== S.currentShop);
        S.currentShop = S.shops[0]?.id || null;
        S.page = "dashboard";
        render();
      }

      // MODALS
      function attachModal() {
        const m = S.modal,
          map = {
            "add-product": () => prodModalHTML(m.prod),
            "add-khata": khataModalHTML,
            "khata-settle": khataSettleModalHTML,
            receipt: () => receiptModalHTML(m.bill),
            "add-shop": () =>
              `<div class="modal"><div class="modal-head"><h3>Add New Shop</h3><button class="btn-icon" onclick="closeModal()">✕</button></div><div class="modal-body">${shopFormHTML(false)}</div></div>`,
          };
        const fn = map[m.type];
        if (!fn) return;
        const div = document.createElement("div");
        div.className = "modal-overlay";
        div.onclick = (e) => {
          if (e.target === div) closeModal();
        };
        div.innerHTML = fn();
        document.body.appendChild(div);
        bindSetup();
        const pc = document.getElementById("p-cat");
        if (pc)
          pc.addEventListener("change", () => {
            const nw = document.getElementById("p-ncw");
            if (nw) nw.style.display = pc.value === "__new" ? "" : "none";
          });
      }
      function closeModal() {
        S.modal = null;
        document.querySelectorAll(".modal-overlay").forEach((e) => e.remove());
      }

      function prodModalHTML(ed) {
        const s = shop();
        const cOpts = s.cats
          .map(
            (c) =>
              `<option value="${c}"${ed && ed.cat === c ? " selected" : ""}>${c}</option>`,
          )
          .join("");
        return `<div class="modal"><div class="modal-head"><h3>${ed ? "Edit" : "Add"} Product</h3><button class="btn-icon" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Product Name *</label><input class="form-input" id="p-name" value="${ed?.name || ""}" placeholder="e.g. Masala Tea" autocomplete="off"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Price ₹ *</label><input class="form-input" id="p-price" type="number" value="${ed?.price || ""}" placeholder="0.00" min="0"></div>
      <div class="form-group"><label class="form-label">Category</label><select class="form-input" id="p-cat">${cOpts}<option value="__new">+ New Category</option></select></div>
    </div>
    <div class="form-group" id="p-ncw" style="display:none"><label class="form-label">New Category</label><input class="form-input" id="p-newcat" placeholder="Category name"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Stock (blank = unlimited)</label><input class="form-input" id="p-stock" type="number" value="${ed?.stock ?? ""}" placeholder="Unlimited"></div>
      <div class="form-group"><label class="form-label">Unit</label><select class="form-input" id="p-unit">${["pcs", "kg", "g", "L", "ml", "box", "packet", "dozen", "bundle"].map((u) => `<option${ed?.unit === u ? " selected" : ""}>${u}</option>`).join("")}</select></div>
    </div>
  </div>
  <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitProduct(${ed ? `'${ed.id}'` : "null"})">${ed ? "Save Changes" : "Add Product"}</button></div></div>`;
      }

      function khataModalHTML() {
        return `<div class="modal"><div class="modal-head"><h3>Add Khata Entry</h3><button class="btn-icon" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Customer Name *</label><input class="form-input" id="k-name" placeholder="Name" autocomplete="off"></div>
    <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="k-phone" type="tel" placeholder="Optional"></div>
    <div class="form-group"><label class="form-label">Amount ₹ *</label><input class="form-input" id="k-amt" type="number" placeholder="0.00" min="0"></div>
    <div class="form-group"><label class="form-label">Note</label><input class="form-input" id="k-note" placeholder="e.g. Monthly grocery credit"></div>
  </div>
  <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitKhata()">Add Entry</button></div></div>`;
      }

      function khataSettleModalHTML() {
        return `<div class="modal"><div class="modal-head"><h3>Bill on Khata</h3><button class="btn-icon" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div style="background:var(--amber-bg);border:1px solid rgba(133,79,11,.2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:14px;font-size:13px">Bill amount <strong>${fmt(total())}</strong> added as credit.</div>
    <div class="form-group"><label class="form-label">Customer Name *</label><input class="form-input" id="kh-name" placeholder="Customer name" autocomplete="off"></div>

  <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-amber" onclick="submitKhataSettle()">Add to Khata</button></div></div>`;

      function receiptModalHTML(bill) {
        const s = S.shops.find((x) => x.id === bill.shop);
        return `<div class="modal"><div class="modal-head"><h3>Receipt</h3><button class="btn-icon" onclick="closeModal()">✕</button></div>

    <div class="rcpt-head"><div class="rcpt-shop">${s?.name || "Shop"}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">${new Date(bill.time).toLocaleString("en-IN")}</div><div style="font-size:11px;color:var(--text3)">Bill #${bill.id.slice(0, 6).toUpperCase()}</div>${bill.table != null && s?.tables ? `<div style="font-size:11px;color:var(--text3)">Table ${s.tables[bill.table]?.num}</div>` : ""}</div>
    <table class="rcpt-table"><thead><tr><td style="font-weight:600;padding-bottom:6px">Item</td><td style="text-align:center;font-weight:600">Qty</td><td style="text-align:right;font-weight:600">Amt</td></tr></thead>

      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:6px"><span>Total</span><span>${fmt(bill.total)}</span></div>
      <div style="text-align:center;margin-top:8px"><span class="badge badge-blue">${bill.payMode.toUpperCase()}</span></div>
    </div>
    <div class="rcpt-foot">Thank you! Visit again 🙏</div>

      function submitProduct(eid) {
        const name = (document.getElementById("p-name")?.value || "").trim();
        const price = document.getElementById("p-price")?.value;
        let cat = document.getElementById("p-cat")?.value;
        const nc = (document.getElementById("p-newcat")?.value || "").trim();
        if (cat === "__new") {
          if (!nc) {
            toast("Enter category name");
            return;
          }
          cat = nc;
          if (!shop().cats.includes(nc)) shop().cats.push(nc);
        }
        if (!name || !price) {
          toast("Name and price required");
          return;
        }
        const d = {
          name,
          price,
          cat,
          stock: document.getElementById("p-stock")?.value || null,
          unit: document.getElementById("p-unit")?.value || "pcs",
        };
        if (eid && eid !== "null") editProduct(eid, d);
        else addProduct(d);
        closeModal();
      }
      function submitKhata() {
        const n = (document.getElementById("k-name")?.value || "").trim(),
          a = document.getElementById("k-amt")?.value;
        if (!n || !a) {
          toast("Name and amount required");
          return;
        }
        addKhata({
          name: n,
          phone: document.getElementById("k-phone")?.value || "",
          amount: a,
          note: document.getElementById("k-note")?.value || "",
        });
      }
      function submitKhataSettle() {
        const n = (document.getElementById("kh-name")?.value || "").trim();
        if (!n) {
          toast("Enter customer name");
          return;
        }
        addKhata({
          name: n,
          phone: document.getElementById("kh-phone")?.value || "",
          amount: total(),
          note: "Bill credit",
        });
        clearCart();
        closeModal();
        toast("Added to khata");
      }

      function showAddProduct() {
        S.modal = { type: "add-product" };
        attachModal();
      }
      function showEditProduct(id) {
        const p = shop().products.find((x) => x.id === id);
        S.modal = { type: "add-product", prod: p };
        attachModal();
      }
      function showAddKhata() {
        S.modal = { type: "add-khata" };
        attachModal();
      }
      function showKhataSettle() {
        S.modal = { type: "khata-settle" };
        attachModal();
      }
      function showAddShop() {
        S.modal = { type: "add-shop" };
        _selType = null;
        attachModal();
        bindSetup();
      }
      function showReceipt(id) {
        const b = S.bills.find((x) => x.id === id);
        if (b) {
          S.modal = { type: "receipt", bill: b };
          attachModal();
        }
      }

      function bindNav() {
        document.querySelectorAll("[data-page]").forEach((btn) => {
          btn.onclick = () => {
            S.page = btn.dataset.page;
            S.activeCat = null;
            S.cartOpen = false;
            closeSidebar();
            render();
          };
        });
      }
      function selCat(c) {
        S.activeCat = c;
        refreshBilling();
      }
      function selTable(i) {
        const s = shop();
        S.selTable = i;
        S.cart = s.tables[i].order
          ? [...s.tables[i].order.map((x) => ({ ...x }))]
          : [];
        s.tables[i].status = "occupied";
        refreshBilling();
      }
      function switchShop(id) {
        S.currentShop = id;
        S.cart = [];
        S.selTable = null;
        S.activeCat = null;
        S.cartOpen = false;
        render();
      }

      let _rzt;
      window.addEventListener("resize", () => {
        clearTimeout(_rzt);
        _rzt = setTimeout(() => {
          if (!isMobile()) {
            closeSidebar();
            S.cartOpen = false;
          }
          render();
        }, 150);
      });
